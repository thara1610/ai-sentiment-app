<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .positive { color: green; }
        .negative { color: red; }
        .neutral { color: orange; }

        img {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🤖 AI Sentiment Analyzer</h1>

<div class="container">

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" onchange="previewImage(event)" required><br>
        <img id="preview" src="" style="display:none;"><br>
        <input type="text" name="text" placeholder="Enter text..." required><br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result 
            {% if result == 'Positive' %}positive
            {% elif result == 'Negative' %}negative
            {% else %}neutral{% endif %}">
            {{ result }}
        </div>
    {% endif %}

</div>

<script>
function previewImage(event) {
    const preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = 'block';
}
</script>

</body>
</html>
